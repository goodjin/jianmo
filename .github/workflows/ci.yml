name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Install (extension root)
        run: npm ci

      - name: Install (webview)
        working-directory: webview
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: IR freeze (decorators baseline)
        run: npm run check:ir-freeze

      - name: Unit tests (root + webview)
        run: npm test

      - name: Build (extension + webview)
        run: npm run build

      - name: Bundle size guard
        run: npm run check:bundle

      - name: Bundle size report (M250)
        run: node ./scripts/record-bundle-sizes.mjs

      - name: VS Code integration tests (M247 smoke, headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a npm run test:vscode

      - name: Release metadata guard
        run: npm run check:release
