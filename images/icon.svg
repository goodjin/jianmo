<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" />
  <!-- "M" letter stylized as a pen/document -->
  <text x="64" y="88" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-2">M</text>
  <!-- Small markdown-style underline accent -->
  <rect x="32" y="96" width="64" height="3" rx="1.5" fill="rgba(255,255,255,0.6)" />
</svg>